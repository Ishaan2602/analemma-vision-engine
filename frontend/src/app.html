<!doctype html>
<html lang="en" style="background-color: #0f172a;">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Upload a sky photo and overlay the sun's yearly analemma figure-eight path. Powered by Astropy and JPL ephemeris data." />

		<!-- Open Graph -->
		<meta property="og:title" content="Analemma Vision" />
		<meta property="og:description" content="Visualize the sun's yearly path on any sky photo" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://analemmavision.app" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Analemma Vision" />
		<meta name="twitter:description" content="Visualize the sun's yearly path on any sky photo" />

		<!-- Inter Font -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script async defer src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
		<noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" /></noscript>
	</body>
</html>
